<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Outer walls -->
  <rect x="20" y="20" width="360" height="260" stroke-width="2.5"/>
  <!-- Interior walls -->
  <line x1="180" y1="20" x2="180" y2="160"/>
  <line x1="20" y1="160" x2="300" y2="160"/>
  <line x1="300" y1="160" x2="300" y2="280"/>
  <!-- Door openings -->
  <line x1="180" y1="90" x2="180" y2="110"/>
  <path d="M180 90 Q200 90 200 110" stroke-width="0.8" stroke-dasharray="none"/>
  <line x1="130" y1="160" x2="150" y2="160"/>
  <path d="M130 160 Q130 140 150 140" stroke-width="0.8"/>
  <!-- Window marks -->
  <line x1="60" y1="20" x2="100" y2="20" stroke-width="2.5"/>
  <line x1="65" y1="16" x2="65" y2="24"/>
  <line x1="95" y1="16" x2="95" y2="24"/>
  <line x1="220" y1="20" x2="260" y2="20" stroke-width="2.5"/>
  <line x1="225" y1="16" x2="225" y2="24"/>
  <line x1="255" y1="16" x2="255" y2="24"/>
  <line x1="20" y1="60" x2="20" y2="100" stroke-width="2.5"/>
  <line x1="16" y1="65" x2="24" y2="65"/>
  <line x1="16" y1="95" x2="24" y2="95"/>
  <line x1="380" y1="60" x2="380" y2="100" stroke-width="2.5"/>
  <line x1="376" y1="65" x2="384" y2="65"/>
  <line x1="376" y1="95" x2="384" y2="95"/>
  <!-- Room labels (small) -->
  <text x="85" y="95" font-size="9" font-family="monospace" fill="currentColor" stroke="none" opacity="0.7">LIVING</text>
  <text x="210" y="95" font-size="9" font-family="monospace" fill="currentColor" stroke="none" opacity="0.7">KITCHEN</text>
  <text x="50" y="220" font-size="9" font-family="monospace" fill="currentColor" stroke="none" opacity="0.7">BED 1</text>
  <text x="195" y="220" font-size="9" font-family="monospace" fill="currentColor" stroke="none" opacity="0.7">BED 2</text>
  <text x="315" y="220" font-size="9" font-family="monospace" fill="currentColor" stroke="none" opacity="0.7">BATH</text>
  <!-- Dimension lines -->
  <line x1="20" y1="295" x2="380" y2="295" stroke-width="0.6" stroke-dasharray="4,3"/>
  <line x1="20" y1="291" x2="20" y2="299" stroke-width="0.8"/>
  <line x1="380" y1="291" x2="380" y2="299" stroke-width="0.8"/>
  <text x="185" y="308" font-size="7" font-family="monospace" fill="currentColor" stroke="none" opacity="0.6">36'-0"</text>
  <line x1="5" y1="20" x2="5" y2="280" stroke-width="0.6" stroke-dasharray="4,3"/>
  <line x1="1" y1="20" x2="9" y2="20" stroke-width="0.8"/>
  <line x1="1" y1="280" x2="9" y2="280" stroke-width="0.8"/>
  <text x="-60" y="155" font-size="7" font-family="monospace" fill="currentColor" stroke="none" opacity="0.6" transform="rotate(-90,5,150)">26'-0"</text>
  <!-- North arrow -->
  <line x1="355" y1="45" x2="355" y2="25" stroke-width="1"/>
  <polygon points="355,22 351,30 355,28 359,30" fill="currentColor" stroke="none" opacity="0.8"/>
  <text x="351" y="52" font-size="7" font-family="monospace" fill="currentColor" stroke="none" opacity="0.7">N</text>
  <!-- Scale bar -->
  <line x1="30" y1="285" x2="80" y2="285" stroke-width="1"/>
  <line x1="30" y1="282" x2="30" y2="288"/>
  <line x1="55" y1="282" x2="55" y2="288"/>
  <line x1="80" y1="282" x2="80" y2="288"/>
  <text x="27" y="278" font-size="6" font-family="monospace" fill="currentColor" stroke="none" opacity="0.6">0  5  10'</text>
</svg>
