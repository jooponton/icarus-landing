<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 220" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Outer walls -->
  <rect x="20" y="20" width="240" height="180" stroke-width="2.5"/>
  <!-- Interior partition -->
  <line x1="20" y1="130" x2="160" y2="130"/>
  <line x1="160" y1="20" x2="160" y2="130"/>
  <!-- Bathroom walls -->
  <line x1="160" y1="80" x2="260" y2="80"/>
  <!-- Door openings -->
  <line x1="100" y1="130" x2="120" y2="130"/>
  <path d="M100 130 Q100 110 120 110" stroke-width="0.8"/>
  <line x1="160" y1="50" x2="160" y2="70"/>
  <path d="M160 50 Q180 50 180 70" stroke-width="0.8"/>
  <!-- Exterior door -->
  <line x1="100" y1="200" x2="140" y2="200"/>
  <path d="M100 200 Q100 180 120 180" stroke-width="0.8"/>
  <!-- Windows -->
  <line x1="40" y1="20" x2="80" y2="20" stroke-width="2.5"/>
  <line x1="45" y1="16" x2="45" y2="24"/>
  <line x1="75" y1="16" x2="75" y2="24"/>
  <line x1="180" y1="20" x2="220" y2="20" stroke-width="2.5"/>
  <line x1="185" y1="16" x2="185" y2="24"/>
  <line x1="215" y1="16" x2="215" y2="24"/>
  <line x1="260" y1="100" x2="260" y2="130" stroke-width="2.5"/>
  <line x1="256" y1="105" x2="264" y2="105"/>
  <line x1="256" y1="125" x2="264" y2="125"/>
  <!-- Fixtures: toilet -->
  <rect x="220" y="85" width="16" height="22" rx="3" stroke-width="0.8"/>
  <ellipse cx="228" cy="90" rx="5" ry="4" stroke-width="0.8"/>
  <!-- Fixtures: sink -->
  <rect x="238" y="85" width="14" height="12" rx="2" stroke-width="0.8"/>
  <circle cx="245" cy="91" r="2" stroke-width="0.8"/>
  <!-- Kitchen counter -->
  <rect x="165" y="130" width="90" height="14" stroke-width="0.8"/>
  <rect x="168" y="133" width="20" height="8" rx="1" stroke-width="0.6"/>
  <circle cx="200" cy="137" r="4" stroke-width="0.8"/>
  <circle cx="213" cy="137" r="4" stroke-width="0.8"/>
  <!-- Room labels -->
  <text x="55" y="80" font-size="8" font-family="monospace" fill="currentColor" stroke="none" opacity="0.7">STUDIO</text>
  <text x="40" y="165" font-size="8" font-family="monospace" fill="currentColor" stroke="none" opacity="0.7">BEDROOM</text>
  <text x="172" y="55" font-size="7" font-family="monospace" fill="currentColor" stroke="none" opacity="0.7">BATH</text>
  <text x="168" y="120" font-size="7" font-family="monospace" fill="currentColor" stroke="none" opacity="0.7">KITCHEN</text>
  <!-- Dimension lines -->
  <line x1="20" y1="210" x2="260" y2="210" stroke-width="0.6" stroke-dasharray="4,3"/>
  <line x1="20" y1="206" x2="20" y2="214"/>
  <line x1="260" y1="206" x2="260" y2="214"/>
  <text x="120" y="218" font-size="6" font-family="monospace" fill="currentColor" stroke="none" opacity="0.6">24'-0"</text>
</svg>
