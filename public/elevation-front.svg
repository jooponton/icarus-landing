<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 240" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Ground line -->
  <line x1="10" y1="210" x2="410" y2="210" stroke-width="1.5"/>
  <!-- Foundation -->
  <rect x="40" y="195" width="340" height="15" stroke-width="1.5"/>
  <!-- Main walls -->
  <rect x="40" y="100" width="340" height="95" stroke-width="2"/>
  <!-- Roof gable -->
  <polyline points="30,100 210,30 390,100" stroke-width="2"/>
  <line x1="30" y1="100" x2="390" y2="100" stroke-width="1"/>
  <!-- Chimney -->
  <rect x="280" y="40" width="24" height="55" stroke-width="1.5"/>
  <line x1="276" y1="40" x2="308" y2="40" stroke-width="1.5"/>
  <!-- Windows - upper -->
  <rect x="90" y="115" width="60" height="50" stroke-width="1.2"/>
  <line x1="120" y1="115" x2="120" y2="165"/>
  <line x1="90" y1="140" x2="150" y2="140"/>
  <!-- Window sill -->
  <line x1="86" y1="165" x2="154" y2="165" stroke-width="1.5"/>
  <rect x="200" y="115" width="60" height="50" stroke-width="1.2"/>
  <line x1="230" y1="115" x2="230" y2="165"/>
  <line x1="200" y1="140" x2="260" y2="140"/>
  <line x1="196" y1="165" x2="264" y2="165" stroke-width="1.5"/>
  <rect x="310" y="115" width="50" height="50" stroke-width="1.2"/>
  <line x1="335" y1="115" x2="335" y2="165"/>
  <line x1="310" y1="140" x2="360" y2="140"/>
  <line x1="306" y1="165" x2="364" y2="165" stroke-width="1.5"/>
  <!-- Front door -->
  <rect x="170" y="155" width="50" height="40" stroke-width="1.5"/>
  <circle cx="215" cy="176" r="2.5" fill="currentColor" stroke="none" opacity="0.8"/>
  <line x1="195" y1="155" x2="195" y2="195" stroke-width="0.8"/>
  <!-- Door pediment -->
  <polyline points="165,155 195,140 225,155" stroke-width="0.8"/>
  <!-- Gable window -->
  <rect x="185" y="55" width="50" height="35" rx="25" stroke-width="1"/>
  <line x1="210" y1="55" x2="210" y2="90"/>
  <!-- Roof shingles (lines) -->
  <line x1="30" y1="100" x2="390" y2="100" stroke-width="0.5" stroke-dasharray="8,6"/>
  <line x1="50" y1="88" x2="370" y2="88" stroke-width="0.5" stroke-dasharray="8,6"/>
  <line x1="75" y1="76" x2="345" y2="76" stroke-width="0.5" stroke-dasharray="8,6"/>
  <line x1="105" y1="64" x2="315" y2="64" stroke-width="0.5" stroke-dasharray="8,6"/>
  <line x1="140" y1="52" x2="280" y2="52" stroke-width="0.5" stroke-dasharray="8,6"/>
  <!-- Dimension lines -->
  <line x1="40" y1="225" x2="380" y2="225" stroke-width="0.6" stroke-dasharray="4,3"/>
  <line x1="40" y1="221" x2="40" y2="229"/>
  <line x1="380" y1="221" x2="380" y2="229"/>
  <text x="190" y="235" font-size="7" font-family="monospace" fill="currentColor" stroke="none" opacity="0.6">34'-0" FRONT ELEVATION</text>
  <!-- Height dimension -->
  <line x1="15" y1="100" x2="15" y2="195" stroke-width="0.6" stroke-dasharray="4,3"/>
  <line x1="11" y1="100" x2="19" y2="100"/>
  <line x1="11" y1="195" x2="19" y2="195"/>
  <text x="-30" y="152" font-size="7" font-family="monospace" fill="currentColor" stroke="none" opacity="0.6" transform="rotate(-90,15,150)">9'-0"</text>
</svg>
